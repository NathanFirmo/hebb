version: "3"

vars:
  BINARY: hebb
  BUILD_DIR: bin
  BUILD_PATH: "{{.BUILD_DIR}}/{{.BINARY}}"
  INSTALL_PATH: /usr/bin/{{.BINARY}}
  GO_TAGS: sqlite_fts5

tasks:
  build:
    desc: Build the Hebb CLI binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -tags "{{.GO_TAGS}}" -o {{.BUILD_PATH}} ./cmd/hebb
    sources:
      - go.mod
      - cmd/**/*.go
      - internal/**/*.go
      - internal/**/*.sql
      - migrations/**/*.sql
    generates:
      - "{{.BUILD_PATH}}"

  install:
    desc: Build and install the Hebb binary into /usr/bin
    deps:
      - build
    cmds:
      - sudo install -m 0755 {{.BUILD_PATH}} {{.INSTALL_PATH}}

  uninstall:
    desc: Remove the Hebb binary from /usr/bin
    cmds:
      - sudo rm -f {{.INSTALL_PATH}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}

  test:
    desc: Run Go tests
    cmds:
      - go test -tags "{{.GO_TAGS}}" ./...
