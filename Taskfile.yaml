version: "3"

vars:
  BINARY: hebb
  BUILD_DIR: bin
  BUILD_PATH: "{{.BUILD_DIR}}/{{.BINARY}}"
  INSTALL_PATH: /usr/bin/{{.BINARY}}
  GO_TAGS: sqlite_fts5

tasks:
  default:
    desc: Lista todas as tasks disponíveis
    cmds:
      - task --list-all

  build:
    desc: Compila o binário CLI do Hebb em bin/hebb
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -tags "{{.GO_TAGS}}" -o {{.BUILD_PATH}} ./cmd/hebb
    sources:
      - go.mod
      - cmd/**/*.go
      - internal/**/*.go
      - internal/**/*.sql
      - migrations/**/*.sql
    generates:
      - "{{.BUILD_PATH}}"

  install:
    desc: Compila e instala o binário do Hebb em /usr/bin
    deps:
      - build
    cmds:
      - sudo install -m 0755 {{.BUILD_PATH}} {{.INSTALL_PATH}}
      - hebb agent install --agent codex --apply
      - hebb agent install --agent claude --apply

  uninstall:
    desc: Remove o binário do Hebb de /usr/bin
    cmds:
      - sudo rm -f {{.INSTALL_PATH}}

  clean:
    desc: Remove artefatos locais de build
    cmds:
      - rm -rf {{.BUILD_DIR}}

  test:
    desc: Executa os testes Go com suporte a SQLite FTS5
    cmds:
      - go test -tags "{{.GO_TAGS}}" ./...
